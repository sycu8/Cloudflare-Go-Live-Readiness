name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy docs to Cloudflare Workers (static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deployment summary
        run: |
          echo "### Cloudflare deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Worker:** cf-ready-docs" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Assets:** docs/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://cf-ready-docs.<account>.workers.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Custom domain:** ready.orangecloud.vn (add in Workers dashboard)" >> "$GITHUB_STEP_SUMMARY"
