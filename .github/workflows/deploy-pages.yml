name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy docs to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name=cf-ready-docs --branch=main

      - name: Deployment summary
        run: |
          echo "### Cloudflare Pages deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project:** cf-ready-docs" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Directory:** docs/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Custom domain:** ready.orangecloud.vn (configure in Cloudflare dashboard)" >> "$GITHUB_STEP_SUMMARY"
