name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "cf-ready-brandkit/**"
      - "web/**"
      - "workers/**"
      - "src/**"
      - "scripts/**"
      - "container/**"
      - "Dockerfile"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI and Web Agent assets
        run: npm run build:all

      - name: Ensure KV namespace for sessions
        run: node scripts/ensure-kv.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ensure D1 database for accounts
        run: node scripts/ensure-d1.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply cf-ready --remote

      - name: Configure Worker OAuth secrets
        run: node scripts/set-worker-secrets.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deployment summary
        run: |
          echo "### Cloudflare deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Worker:** cf-ready-docs" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Assets:** docs/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://cf-ready-docs.<account>.workers.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Custom domain:** ready.orangecloud.vn (add in Workers dashboard)" >> "$GITHUB_STEP_SUMMARY"
