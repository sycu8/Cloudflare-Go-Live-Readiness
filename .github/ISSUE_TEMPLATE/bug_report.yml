name: Bug Report
description: Report a bug in cf-ready
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cf-ready scan`
        2. ...
  - type: input
    id: version
    attributes:
      label: cf-ready version
  - type: input
    id: node
    attributes:
      label: Node.js version
